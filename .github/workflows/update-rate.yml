name: Auto-update EUR/INR rate

on:
  schedule:
    # Runs at 06:00 UTC on the 7th of every month
    - cron: '0 6 7 * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions UI (for testing)

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install firebase-admin
        run: npm install firebase-admin node-fetch

      - name: Fetch rate and write to Firebase
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/update-rate.mjs
